name: QEMU GenieZone 构建
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  apiLevel: 35
  ndkPath: "~/android-ndk-r30-beta1"
  toolchain: "~/android-ndk-r30-beta1/toolchains/llvm/prebuilt/linux-x86_64"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ninja-build pkg-config xz-utils
        sudo pip3 install --upgrade meson
    - name: 配置 Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r30-beta1-linux.zip -O ndk.zip
        unzip -q ndk.zip -d $HOME
        rm ndk.zip
    - name: 配置 sysroot
      run: |
        wget https://raw.githubusercontent.com/AnyLaySys/qemu-gunyah-build/main/1.sh
        chmod +x ./1.sh
        ./1.sh
    - name: 拉取源码
      run: |
        git clone https://github.com/AnyLaySys/qemu-geniezone.git build/src/qemu-geniezone-main
    - name: 开始编译
      run: |
        set -e
        srcDir="$GITHUB_WORKSPACE/build/src/qemu-geniezone-main"
        sysrootDir="$GITHUB_WORKSPACE/build/sysroot"
        cd "$srcDir"
        env PATH="$toolchain/bin:$sysrootDir/bin:$PATH" PKG_CONFIG=/usr/bin/pkg-config PKG_CONFIG_LIBDIR="$sysrootDir/lib/pkgconfig" PKG_CONFIG_PATH="$sysrootDir/lib/pkgconfig" LDFLAGS="-L$sysrootDir/lib -Wl,-rpath-link,$sysrootDir/lib" AR="$toolchain/bin/llvm-ar" NM="$toolchain/bin/llvm-nm" OBJCOPY="$toolchain/bin/llvm-objcopy" RANLIB="$toolchain/bin/llvm-ranlib" STRIP="$toolchain/bin/llvm-strip" ./configure --cpu=aarch64 --cross-prefix=aarch64-linux-android- --target-list=aarch64-softmmu --enable-gzvm --enable-tcg --with-coroutine=sigaltstack --extra-cflags="-I$sysrootDir/include" --disable-dbus-display --disable-docs --disable-gio --disable-hvf --disable-kvm --disable-multiprocess --disable-nitro --disable-opengl --disable-tools --disable-guest-agent --disable-usb-redir --disable-virtfs --disable-vduse-blk-export --disable-libvduse --disable-vhost-crypto --disable-vhost-kernel --disable-vhost-net --disable-vhost-user --disable-vhost-user-blk-server --disable-vhost-vdpa --disable-virglrenderer --disable-werror --disable-qemu-vnc --disable-tpm
        ninja -C build -j$(nproc) qemu-system-aarch64
    - name: 开始打包
      run: |
        set -e
        srcDir="$GITHUB_WORKSPACE/build/src/qemu-geniezone-main"
        sysrootDir="$GITHUB_WORKSPACE/build/sysroot"
        qvmDir="$GITHUB_WORKSPACE/qvm"
        cp "$srcDir/build/qemu-system-aarch64" "$qvmDir/qemu-system-aarch64"
        cp -L "$sysrootDir/lib/libpixman-1.so" "$qvmDir/libpixman-1.so" || true
        cp -L "$sysrootDir/lib/libusb-1.0.so" "$qvmDir/libusb-1.0.so" || true
        cp -L "$sysrootDir/lib/libglib-2.0.so.0" "$qvmDir/libglib-2.0.so.0" || true
        cp -L "$sysrootDir/lib/libgmodule-2.0.so.0" "$qvmDir/libgmodule-2.0.so.0" || true
        cp -L "$sysrootDir/lib/libintl.so.8" "$qvmDir/libintl.so.8" || true
        cp -L "$sysrootDir/lib/libpcre2-8.so" "$qvmDir/libpcre2-8.so" || true
        cp -L "$toolchain/sysroot/usr/lib/aarch64-linux-android/$apiLevel/libz.so" "$qvmDir/libz.so"
        cp "$srcDir/pc-bios/keymaps/en-us" "$qvmDir/pc-bios/keymaps/en-us"
        cp "$srcDir/pc-bios/efi-virtio.rom" "$qvmDir/pc-bios/efi-virtio.rom"
        "$toolchain/bin/llvm-strip" --strip-all "$qvmDir/qemu-system-aarch64" "$qvmDir"/*.so
        tar --numeric-owner -c qvm | xz > qvm.xz
    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: qemu-system-aarch64
        path: qvm.xz
        if-no-files-found: error
